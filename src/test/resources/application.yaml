spring:
  datasource:
    url: jdbc:h2:mem:bank_core_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop # Automatically builds tables before tests, drops them after
    show-sql: true          # Useful for debugging transaction locks and SQL statements
    properties:
      hibernate:
        format_sql: true