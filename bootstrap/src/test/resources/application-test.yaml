spring:
  datasource:
    url: jdbc:h2:mem:bankcore-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  h2:
    console:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health

bank:
  transfer:
    # Tight bound so transfer-locking contention tests fail fast.
    lock-wait-ms: 500
  clearing-account:
    # Symmetric with production default; declared here so the test profile
    # is self-documenting about which clearing-account row F08 funds from.
    number: CLEARING-000
