spring:
  datasource:
    url: jdbc:h2:mem:bankcore-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  h2:
    console:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        # Mirror production exposure so /actuator/prometheus is reachable
        # from @SpringBootTest scrape assertions.
        include: health,info,metrics,prometheus

bank:
  transfer:
    # Tight bound so transfer-locking contention tests fail fast.
    lock-wait-ms: 500
  clearing-account:
    # Symmetric with production default; declared here so the test profile
    # is self-documenting about which clearing-account row F08 funds from.
    number: CLEARING-000
  journal-verification:
    # F10 stays effectively dormant under the default `test` profile: an
    # always-firing background scheduler races test @BeforeEach wipes and
    # produces sporadic off-by-one journal counts on tests that don't care
    # about it (e.g. TransferControllerTest, OpenAccountServiceIntegrationTest).
    # F10's own integration test (JournalVerificationIntegrationTest)
    # overrides initial-delay-ms back to 0 and uses an isolated H2 URL via
    # @SpringBootTest(properties=...) — same pattern balance-drift uses below.
    fixed-delay-ms: 200
    initial-delay-ms: 3600000
    page-size: 50
  balance-drift:
    # F11 stays effectively dormant under the default `test` profile: many
    # integration tests hand-seed accounts via accounts.save(...) which
    # bypasses the F06 transfer pipeline, leaving cached balances without
    # matching ledger entries. A fast-cadence F11 audit would then suspend
    # those test fixtures the first time it ticks. F11's own integration
    # test overrides these values via @SpringBootTest(properties = ...)
    # to get a sub-second cadence within its isolated H2 URL.
    fixed-delay-ms: 30000
    initial-delay-ms: 3600000
