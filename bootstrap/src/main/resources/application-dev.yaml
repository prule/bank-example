spring:
  h2:
    console:
      enabled: true
      path: /h2-console

bank-core:
  h2:
    # H2 TCP server that exposes the live application database (the same
    # mem:bankcore instance Hikari is using — H2 in-memory DBs are shared
    # across all connections inside a single JVM, so external clients see
    # the same Flyway-migrated tables and the same uncommitted data).
    #
    # Connect from your JDBC client of choice with:
    #   jdbc:h2:tcp://localhost:9092/mem:bankcore
    #   user: sa   (password: empty)
    #
    # Production safety: H2ServerInitializer is @Profile("dev")-gated, so
    # flipping this property has no effect outside the dev profile.
    #
    # Per-session escape hatches:
    #   * To restore the old "off" behaviour for a single run:
    #       --bank-core.h2.tcp-server.enabled=false
    #   * To persist data across restarts, override the datasource URL too:
    #       --spring.datasource.url=jdbc:h2:file:./build/h2-dev;DB_CLOSE_DELAY=-1
    #     The corresponding TCP URL fragment becomes:
    #       jdbc:h2:tcp://localhost:9092/file:./build/h2-dev
    #
    # Caveat: external clients see the live application DB. Writing to it
    # (especially DDL) can break the running application — Hibernate runs
    # with ddl-auto=validate and will reject the next read if the schema
    # diverges.
    tcp-server:
      enabled: true
      port: 9092

# Dev profile exposes Swagger UI, pointed at the hand-written /v3/api-docs
# (served by OpenApiController from the canonical contract file). Springdoc's
# own annotation-scanned endpoint is moved off /v3/api-docs to avoid colliding
# with the controller; it is left enabled because disabling it also disables
# springdoc's UI auto-configuration.
springdoc:
  api-docs:
    enabled: true
    path: /internal/springdoc-api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    url: /v3/api-docs
    disable-swagger-default-url: true

# F09 dev seed under the `dev` profile. Three intentional customer shapes so
# a developer can exercise every F08 path without editing config:
#   * CUST-1001 — large funded open (exercises happy-path transfer).
#   * CUST-1002 — small funded open.
#   * CUST-1003 — zero-balance open (exercises F08's no-journal path).
bank:
  seed:
    enabled: true
    clearingAccountOpeningBalance: 100000.00
    customers:
      - number: CUST-1001
        openingBalance: 500.00
      - number: CUST-1002
        openingBalance: 250.00
      - number: CUST-1003
        openingBalance: 0.00
