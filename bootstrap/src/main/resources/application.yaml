spring:
  application:
    name: bank-core
  datasource:
    url: jdbc:h2:mem:bankcore;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  h2:
    console:
      enabled: false
  # Required so GlobalExceptionHandler can map unknown URLs to the canonical
  # 404 RESOURCE_NOT_FOUND envelope. Without these two knobs Spring's static
  # resource handler silently swallows unmatched paths and returns Whitelabel.
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
      show-components: always

server:
  port: 8080

# Swagger UI is gated off in default/test. The `dev` profile overrides
# springdoc.swagger-ui.enabled=true and points the UI at the hand-written
# /v3/api-docs endpoint that serves the canonical contract.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

bank:
  transfer:
    # Locker strategy: 'jvm' (default, single-instance — process-wide
    # ConcurrentHashMap<AccountNumber, ReentrantLock>) or 'db' (multi-
    # instance — SELECT id FROM account ... FOR UPDATE serialises across
    # all JVMs sharing the database).
    #
    # The 'db' strategy is required for any deployment with more than one
    # application instance behind a load balancer. 'jvm' is faster
    # (~10 ns per acquisition vs ~1 ms DB round-trip on H2-in-memory)
    # but only correct under single-instance topology.
    #
    # Both strategies honour bank.transfer.lock-wait-ms (default 5000)
    # and throw the same LockAcquisitionTimeoutException on timeout.
    locker: jvm
    # Maximum wait for a paired write-lock acquisition before failing with
    # LockAcquisitionTimeoutException (transfer-locking spec, F07).
    lock-wait-ms: 5000
  clearing-account:
    # Well-known account number that funds every account opened with a
    # positive opening balance (F08). F09 seeds the row at startup when
    # SEED_DATA=true. The default is intentionally human-recognisable so
    # operators inspecting `account` immediately spot the system row.
    number: CLEARING-000
  # F09 dev-data seeding. Production-safe default: disabled.
  #
  # * Switch alias: SEED_DATA=true is mapped onto bank.seed.enabled=true by
  #   SeedDataEnvironmentPostProcessor with LOW precedence — any explicit
  #   value here, in application-<profile>.yaml, on the command line, or
  #   via BANK_SEED_ENABLED wins over the alias.
  # * The `dev` profile overrides this block to enable=true with a populated
  #   customer plan; see application-dev.yaml for the canonical example.
  # * Tests opt in per-class via @SpringBootTest(properties = {...}); they do
  #   NOT inherit any seed defaults from this profile.
  seed:
    enabled: false
  # F11 — periodic background audit that compares each account's cached
  # balance against the sum of its ledger movements and Suspends Active
  # accounts whose two values disagree (clearing account exempt by spec).
  # See openspec/specs/balance-drift-detection/spec.md.
  balance-drift:
    fixed-delay-ms: 30000   # Spec target: every 30 s.
    initial-delay-ms: 15000 # Staggered so this and journal-verification do not fire at the same second after boot.
  journal-verification:
    # F10 background sweep: promotes Pending journal_entry rows to VERIFIED
    # or FAILED (cascading account suspension on FAILED).
    # See openspec/specs/journal-verification/spec.md.
    fixed-delay-ms: 10000   # spec target: every 10 s; fixedDelay (not fixedRate) so a slow tick never overlaps with itself
    initial-delay-ms: 5000  # small head start so the sweep doesn't race the application context's first POST handler
    page-size: 50           # spec target: at most 50 Pending journals per tick
