type: object
required:
  - code
  - message
  - timestamp
properties:
  code:
    type: string
    enum:
      - INSUFFICIENT_FUNDS
      - ACCOUNT_INACTIVE
      - RESOURCE_NOT_FOUND
      - BAD_REQUEST_PAYLOAD
      - INTERNAL_SERVER_ERROR
  message:
    type: string
  timestamp:
    type: string
    format: date-time
