type: object
description: >
  Canonical error envelope returned by every 4xx/5xx response in the API.
  The `code` property is a stable machine-readable identifier; the taxonomy
  of permitted codes is owned by F03 (api-error-contract), which will tighten
  this schema to enumerate the allowed values.
required:
  - code
  - message
  - timestamp
properties:
  code:
    type: string
    description: Stable machine-readable error code (taxonomy defined in F03).
    example: VALIDATION_FAILED
  message:
    type: string
    description: Human-readable explanation suitable for support diagnostics.
    example: Request body failed validation.
  timestamp:
    type: string
    format: date-time
    description: Server-side instant the error was generated, in ISO-8601 with timezone offset.
    example: "2026-05-23T14:30:00Z"
