spring:
  datasource:
    url: jdbc:h2:mem:bankcore;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false

bank-core:
  h2:
    tcp-server:
      enabled: false

bank:
  transfer:
    lock-wait-ms: 500

