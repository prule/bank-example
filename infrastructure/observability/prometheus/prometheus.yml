# Prometheus scrape configuration for the bank-core observability stack.
#
# Scrapes the bank-core Spring Boot app running on the host machine
# (NOT in this compose network) at host.docker.internal:8080. The
# host.docker.internal name resolves on macOS/Windows natively and on
# Linux via the compose file's extra_hosts: host-gateway mapping.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: bank-core
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          application: bank-core
          environment: local

  # Self-scrape so the Targets page always shows at least one UP target
  # even when the bank-core app is down.
  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:9090
